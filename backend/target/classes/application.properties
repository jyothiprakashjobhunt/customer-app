# Application
spring.application.name=customer-management

# Server
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:customerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# DDL is now managed by Liquibase - Hibernate must NOT auto-create/drop tables
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Liquibase - runs changelog scripts on startup to create/migrate the schema
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml


spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Cache - Caffeine as the cache provider
spring.cache.type=caffeine

# Logging
logging.level.com.customerapp=DEBUG
logging.level.org.springframework.web=INFO
logging.level.liquibase=INFO

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# CORS
cors.allowed-origin=http://localhost:4200
